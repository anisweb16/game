name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  test:
    name: pytest + coverage
    runs-on: ubuntu-latest

    # ── MySQL service container ────────────────────────────────────────────────
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ci_password
          MYSQL_DATABASE: gamexstore_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -pci_password"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
          --health-start-period=20s

    # ── Environment variables for main.py + conftest.py ───────────────────────
    env:
      DB_HOST: 127.0.0.1
      DB_USER: root
      DB_PASSWORD: ci_password
      DB_NAME: gamexstore_db
      # GEMINI_API_KEY intentionally omitted → needs_gemini tests are skipped
      ALLOWED_ORIGINS: "http://127.0.0.1:5501,http://localhost:5501"

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python setup ──────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # ── 3. Install dependencies ───────────────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      # ── 4. Load database schema ───────────────────────────────────────────────
      - name: Load bbdd.sql into MySQL
        run: |
          mysql -h 127.0.0.1 -u root -pci_password gamexstore_db < bbdd.sql

      # ── 5. Run tests ──────────────────────────────────────────────────────────
      - name: Run pytest with coverage
        run: |
          pytest -v --cov=main --cov-report=term-missing --cov-report=xml

      # ── 6. Upload coverage report (optional — requires no token) ──────────────
      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
        # This step is a no-op until you connect the repo at codecov.io
        # It will silently skip if CODECOV_TOKEN is not set
        continue-on-error: true
