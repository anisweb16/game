<!-- QUICK VIEW MODAL -->
<div id="qv-bg">
    <div id="qv-modal" role="dialog" aria-modal="true">
        <button id="qv-x" aria-label="Cerrar">✕</button>
        <div class="qv-wrap">
            <div class="qv-imgs">
                <img id="qv-img" class="qv-main-img" src="" alt="">
                <div class="qv-thumbs" id="qv-thumbs"></div>
            </div>
            <div class="qv-info">
                <div class="qv-brand"  id="qv-brand"></div>
                <h2  class="qv-name"   id="qv-name"></h2>
                <div class="qv-stars-row">
                    <span class="s" id="qv-stars"></span>
                    <span class="r" id="qv-reviews"></span>
                </div>
                <div class="qv-price-row">
                    <span class="qv-price" id="qv-price"></span>
                    <span class="qv-old"   id="qv-old"></span>
                    <span class="qv-save"  id="qv-save"></span>
                </div>
                <div class="qv-stock" id="qv-stock"></div>
                <p   class="qv-desc"  id="qv-desc"></p>
                <div class="qv-feats" id="qv-feats"></div>
                <div class="qv-actions">
                    <button class="btn-qv-add"  id="btn-qv-add">🛒 Añadir al carrito</button>
                    <button class="btn-qv-wish" id="btn-qv-wish" aria-label="Wishlist">🤍</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- SHOP LAYOUT -->
<div class="shop-wrap">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">

        <!-- Categories -->
        <div class="sb-box">
            <div class="sb-title">Categorías</div>
            <div class="cat-list" id="cat-list">
                <button class="cat-item active" data-cat="all">🎮 Todos<span class="cat-count" id="cnt-all">32</span></button>

                <button class="cat-item" data-cat="juego">📀 Juegos<span class="cat-count" id="cnt-juego">14</span></button>
            </div>
        </div>

        <!-- Price range -->
        <div class="sb-box">
            <div class="sb-title">Precio máximo</div>
            <div class="price-range">
                <input type="range" class="price-slider" id="price-slider" min="0" max="700" value="700" step="10">
                <div class="price-row">
                    <span>0 €</span>
                    <span id="price-val">600 €</span>
                </div>
            </div>
        </div>

        <!-- Brands -->
        <div class="sb-box">
            <div class="sb-title">Marcas</div>
            <div class="brand-list" id="brand-list">
                <label class="brand-check"><input type="checkbox" value="Sony" checked><span>Sony / PlayStation</span></label>
                <label class="brand-check"><input type="checkbox" value="Nintendo" checked><span>Nintendo</span></label>
                <label class="brand-check"><input type="checkbox" value="Microsoft" checked><span>Microsoft / Xbox</span></label>
                <label class="brand-check"><input type="checkbox" value="Razer" checked><span>Razer</span></label>
                <label class="brand-check"><input type="checkbox" value="Logitech" checked><span>Logitech</span></label>
                <label class="brand-check"><input type="checkbox" value="HyperX" checked><span>HyperX</span></label>
                <label class="brand-check"><input type="checkbox" value="LG" checked><span>LG</span></label>
            </div>
        </div>

        <!-- Rating -->
        <div class="sb-box">
            <div class="sb-title">Valoración mínima</div>
            <div class="rating-list" id="rating-list">
                <button class="rating-item active" data-rating="0"><span class="stars">★★★★★</span><span>Todas</span></button>
                <button class="rating-item" data-rating="4"><span class="stars">★★★★☆</span><span>4+ estrellas</span></button>
                <button class="rating-item" data-rating="5"><span class="stars">★★★★★</span><span>5 estrellas</span></button>
            </div>
        </div>

    </aside>

    <!-- MAIN -->
    <div class="shop-main">

        <!-- Top bar -->
        <div class="shop-topbar">
            <div class="results-count" id="results-count">
                <strong>15</strong> productos
            </div>
            <div class="topbar-right">
                <select class="sort-sel" id="sort-sel">
                    <option value="">Más relevantes</option>
                    <option value="price-asc">Precio: menor a mayor</option>
                    <option value="price-desc">Precio: mayor a menor</option>
                    <option value="rating">Mejor valorados</option>
                    <option value="name">Nombre A–Z</option>
                </select>
                <div class="view-btns">
                    <button class="view-btn active" id="btn-grid" aria-label="Vista cuadrícula">⊞</button>
                    <button class="view-btn" id="btn-list" aria-label="Vista lista">☰</button>
                </div>
            </div>
        </div>

        <!-- Grid -->
        <div class="pgrid" id="pgrid"></div>

        <!-- Pagination -->
        <div class="pagination" id="pagination"></div>

    </div>
</div>

/* ═══════════════════════════════════
   STATE
═══════════════════════════════════ */
var state = {
    cat:      "all",
    maxPrice: 700,
    brands:   ["Sony","Nintendo","Microsoft","Razer","Logitech","HyperX","LG"],
    rating:   0,
    sort:     "",
    view:     "grid",
    page:     1,
    perPage:  12,
    wishlist: JSON.parse(localStorage.getItem("gamex-wish") || "[]")
};

/* ═══════════════════════════════════
   FILTER + SORT
═══════════════════════════════════ */
function getFiltered() {
    return PRODUCTS.filter(function(p) {
        if (state.cat !== "all" && p.cat !== state.cat) return false;
        if (p.price > state.maxPrice) return false;
        if (!state.brands.includes(p.brand)) return false;
        if (p.stars < state.rating) return false;
        return true;
    });
}

function getSorted(list) {
    var arr = list.slice();
    if (state.sort === "price-asc")  arr.sort(function(a,b){ return a.price - b.price; });
    if (state.sort === "price-desc") arr.sort(function(a,b){ return b.price - a.price; });
    if (state.sort === "rating")     arr.sort(function(a,b){ return b.stars - a.stars || b.reviews - a.reviews; });
    if (state.sort === "name")       arr.sort(function(a,b){ return a.name.localeCompare(b.name); });
    return arr;
}

/* ═══════════════════════════════════
   RENDER
═══════════════════════════════════ */
function starStr(n, total) {
    total = total || 5;
    return "★".repeat(n) + "☆".repeat(total - n);
}

function saveStr(p) {
    if (!p.oldPrice) return "";
    return "-" + Math.round((1 - p.price / p.oldPrice) * 100) + "%";
}

function renderCard(p) {
    var isWish = state.wishlist.includes(p.id);
    return '<article class="p-card" data-id="' + p.id + '">' +
        (p.badge ? '<span class="p-badge ' + p.badge + '">' + p.badgeText + '</span>' : '') +
        '<button class="p-wish' + (isWish ? ' active' : '') + '" onclick="toggleWish(event,' + p.id + ')" aria-label="Wishlist">' +
            (isWish ? '❤️' : '🤍') +
        '</button>' +
        '<div class="p-img" onclick="openQV(' + p.id + ')">' +
            '<img src="' + p.img + '" onerror="this.src=\'' + p.fb + '\'" alt="' + p.name + '" loading="lazy">' +
        '</div>' +
        '<div class="p-body">' +
            '<div class="p-brand">' + p.brandFull + '</div>' +
            '<div class="p-name">'  + p.name + '</div>' +
            '<div class="p-stars">' +
                '<span class="s">' + starStr(p.stars) + '</span>' +
                '<span class="r">(' + p.reviews.toLocaleString() + ')</span>' +
            '</div>' +
            '<div class="p-footer">' +
                '<div class="p-prices">' +
                    (p.oldPrice ? '<span class="p-old">' + p.oldPrice + ' €</span>' : '') +
                    '<span class="p-price">' + p.price + ' €</span>' +
                    (p.oldPrice ? '<span class="p-save">' + saveStr(p) + '</span>' : '') +
                '</div>' +
                '<div class="p-stock ' + p.stock + '">' + p.stockText + '</div>' +
                '<div class="p-actions">' +
                    '<button class="btn-add" onclick="addToCart(' + p.id + ')">🛒 Añadir</button>' +
                    '<button class="btn-qv"  onclick="openQV(' + p.id + ')">👁</button>' +
                '</div>' +
            '</div>' +
        '</div>' +
    '</article>';
}

function render() {
    var filtered = getFiltered();
    var sorted   = getSorted(filtered);
    var total    = sorted.length;
    var pages    = Math.ceil(total / state.perPage) || 1;
    if (state.page > pages) state.page = 1;

    var start = (state.page - 1) * state.perPage;
    var paged = sorted.slice(start, start + state.perPage);

    var grid = document.getElementById("pgrid");
    grid.className = "pgrid" + (state.view === "list" ? " list-view" : "");
    grid.innerHTML = paged.map(renderCard).join("");

    document.getElementById("results-count").innerHTML =
        "<strong>" + total + "</strong> producto" + (total !== 1 ? "s" : "");

    renderPagination(pages);
}

function renderPagination(pages) {
    var pg = document.getElementById("pagination");
    if (pages <= 1) { pg.innerHTML = ""; return; }
    var html = '<button class="pg-btn" onclick="goPage(' + (state.page - 1) + ')" ' + (state.page <= 1 ? "disabled" : "") + '>‹</button>';
    for (var i = 1; i <= pages; i++) {
        html += '<button class="pg-btn' + (i === state.page ? " active" : "") + '" onclick="goPage(' + i + ')">' + i + '</button>';
    }
    html += '<button class="pg-btn" onclick="goPage(' + (state.page + 1) + ')" ' + (state.page >= pages ? "disabled" : "") + '>›</button>';
    pg.innerHTML = html;
}

function goPage(n) { state.page = n; render(); window.scrollTo({top:0, behavior:"smooth"}); }

/* ═══════════════════════════════════
   FILTER EVENTS
═══════════════════════════════════ */
document.querySelectorAll(".cat-item").forEach(function(btn) {
    btn.addEventListener("click", function() {
        document.querySelectorAll(".cat-item").forEach(function(b){ b.classList.remove("active"); });
        this.classList.add("active");
        state.cat = this.dataset.cat;
        state.page = 1;
        render();
    });
});

var priceSlider = document.getElementById("price-slider");
priceSlider.addEventListener("input", function() {
    state.maxPrice = +this.value;
    document.getElementById("price-val").textContent = this.value + " €";
    var pct = (this.value / 700 * 100) + "%";
    this.style.setProperty("--pct", pct);
    state.page = 1;
    render();
});

document.querySelectorAll("#brand-list input").forEach(function(cb) {
    cb.addEventListener("change", function() {
        state.brands = Array.from(document.querySelectorAll("#brand-list input:checked")).map(function(x){ return x.value; });
        state.page = 1;
        render();
    });
});

document.querySelectorAll(".rating-item").forEach(function(btn) {
    btn.addEventListener("click", function() {
        document.querySelectorAll(".rating-item").forEach(function(b){ b.classList.remove("active"); });
        this.classList.add("active");
        state.rating = +this.dataset.rating;
        state.page = 1;
        render();
    });
});

document.getElementById("sort-sel").addEventListener("change", function() {
    state.sort = this.value;
    state.page = 1;
    render();
});

document.getElementById("btn-grid").addEventListener("click", function() {
    state.view = "grid";
    document.getElementById("btn-grid").classList.add("active");
    document.getElementById("btn-list").classList.remove("active");
    render();
});
document.getElementById("btn-list").addEventListener("click", function() {
    state.view = "list";
    document.getElementById("btn-list").classList.add("active");
    document.getElementById("btn-grid").classList.remove("active");
    render();
});

/* ═══════════════════════════════════
   CART
═══════════════════════════════════ */
function addToCart(id) {
    var p = PRODUCTS.find(function(x){ return x.id === id; });
    if (p) window.GamexCart.add({ id:p.id, name:p.name, price:p.price, img:p.img, brand:p.brandFull });
}

/* ═══════════════════════════════════
   WISHLIST
═══════════════════════════════════ */
function toggleWish(e, id) {
    e.stopPropagation();
    var idx = state.wishlist.indexOf(id);
    if (idx > -1) { state.wishlist.splice(idx, 1); }
    else          { state.wishlist.push(id); }
    localStorage.setItem("gamex-wish", JSON.stringify(state.wishlist));
    var btn = e.currentTarget;
    var active = state.wishlist.includes(id);
    btn.classList.toggle("active", active);
    btn.textContent = active ? "❤️" : "🤍";
    if (window.showToast) window.showToast(active ? "❤️ Añadido a favoritos" : "Eliminado de favoritos", "info");
}

/* ═══════════════════════════════════
   QUICK VIEW
═══════════════════════════════════ */
var qvId = null;

function openQV(id) {
    var p = PRODUCTS.find(function(x){ return x.id === id; });
    if (!p) return;
    qvId = id;

    var img = document.getElementById("qv-img");
    img.src = p.img; img.onerror = function(){ this.src = p.fb; }; img.alt = p.name;

    /* Thumbnails */
    var thumbsEl = document.getElementById("qv-thumbs");
    thumbsEl.innerHTML = p.thumbs.map(function(src, i) {
        return '<img class="qv-thumb' + (i===0?" active":"") + '" src="' + src + '" onerror="this.src=\'' + p.fb + '\'" onclick="switchThumb(this,\'' + src + '\')" alt="">';
    }).join("");

    document.getElementById("qv-brand").textContent    = p.brandFull;
    document.getElementById("qv-name").textContent     = p.name;
    document.getElementById("qv-stars").textContent    = starStr(p.stars);
    document.getElementById("qv-reviews").textContent  = "(" + p.reviews.toLocaleString() + " reseñas)";
    document.getElementById("qv-price").textContent    = p.price + " €";
    document.getElementById("qv-old").textContent      = p.oldPrice ? p.oldPrice + " €" : "";
    document.getElementById("qv-save").textContent     = saveStr(p);
    document.getElementById("qv-stock").className      = "qv-stock " + p.stock;
    document.getElementById("qv-stock").textContent    = p.stockText;
    document.getElementById("qv-desc").textContent     = p.desc;
    document.getElementById("qv-feats").innerHTML      = p.feats.map(function(f){ return '<span class="qv-feat">✓ ' + f + '</span>'; }).join("");

    var isWish = state.wishlist.includes(id);
    document.getElementById("btn-qv-wish").textContent = isWish ? "❤️" : "🤍";

    document.getElementById("qv-bg").classList.add("open");
    document.body.style.overflow = "hidden";
}

function switchThumb(el, src) {
    document.getElementById("qv-img").src = src;
    document.querySelectorAll(".qv-thumb").forEach(function(t){ t.classList.remove("active"); });
    el.classList.add("active");
}

function closeQV() {
    document.getElementById("qv-bg").classList.remove("open");
    document.body.style.overflow = "";
    qvId = null;
}

document.getElementById("qv-x").addEventListener("click", closeQV);
document.getElementById("qv-bg").addEventListener("click", function(e){ if (e.target === this) closeQV(); });
document.getElementById("btn-qv-add").addEventListener("click", function(){ if (qvId) { addToCart(qvId); closeQV(); } });
document.getElementById("btn-qv-wish").addEventListener("click", function(){
    if (!qvId) return;
    var idx = state.wishlist.indexOf(qvId);
    if (idx > -1) { state.wishlist.splice(idx, 1); this.textContent = "🤍"; }
    else { state.wishlist.push(qvId); this.textContent = "❤️"; }
    localStorage.setItem("gamex-wish", JSON.stringify(state.wishlist));
});
document.addEventListener("keydown", function(e){ if (e.key === "Escape") closeQV(); });

/* ═══════════════════════════════════
   INIT
═══════════════════════════════════ */
document.addEventListener("DOMContentLoaded", render);
</script>
